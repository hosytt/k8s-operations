# Private Ingress - IP WhitelistлКФ kustomization.yamlмЭШ commonAnnotationsмЧРмДЬ кіАл¶ђ
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-ingress
  namespace: argo-cd
spec:
  ingressClassName: nginx
  rules:
    - host: argocd.test.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80

