apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets-web
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra-structure
  # Use Argo CD 2.6+ Multiple Sources (Helm repository + Git resources)
  sources:
    - repoURL: https://charts.bakito.net
      chart: sealed-secrets-web
      targetRevision: 3.2.0
      helm:
        values: |
          sealedSecrets:
            namespace: sealed-secrets
            serviceName: sealed-secrets
          disableLoadSecrets: true
    - repoURL: git@github.com:hosytt/k8s-operations.git
      path: infra/sealed-secrets-web
      targetRevision: main
      kustomize: {}  # Use kustomization.yaml (manage resources only)
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets-web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true

