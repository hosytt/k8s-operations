apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-community
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra-structure
  # Use Argo CD 2.6+ Multiple Sources (Helm repository + Git resources)
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 80.4.1
      helm:
        values: |
          kubeEtcd:
            enabled: false
          kubeProxy:
            enabled: false
          kubeScheduler:
            enabled: false
          kubeControllerManager:
            enabled: false

          prometheus:
            prometheusSpec:
              retention: 30d
              retentionSize: 1GiB
              scrapeInterval: 30s
              storageSpec:
                volumeClaimTemplate:
                  spec:
                    storageClassName: longhorn
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 3Gi
              walCompression: true
              enableAdminAPI: false
            service:
              type: ClusterIP
              port: 9090
          grafana:
            persistence:
              enabled: true
              type: pvc
              storageClassName: longhorn
              accessModes:
                - ReadWriteOnce
              size: 1Gi
            service:
              type: ClusterIP
              port: 9091
          alertmanager:
            alertmanagerSpec:
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: longhorn
                    accessModes: ["ReadWriteOnce"]
                    resources:
                      requests:
                        storage: 1Gi
            service:
              type: ClusterIP
              port: 9093
    - repoURL: git@github.com:hosytt/k8s-operations.git
      path: infra/prometheus-community
      targetRevision: main
      kustomize: {}  # Use kustomization.yaml (manage resources only)
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true

